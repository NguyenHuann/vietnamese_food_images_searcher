<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Ẩm Thực Việt Nam - Image Retrieval</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen font-sans">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
      <h1 class="text-3xl font-bold text-center text-blue-600 mb-8">
        Tra Cứu Món Ăn Việt Nam Bằng AI
      </h1>

      <div class="bg-white p-6 rounded-lg shadow-md mb-8 text-center">
        <input
          type="file"
          id="imageInput"
          accept="image/*"
          class="hidden"
          onchange="previewImage(event)"
        />
        <label
          for="imageInput"
          class="cursor-pointer bg-blue-50 text-blue-600 border border-blue-200 px-6 py-3 rounded-lg font-semibold hover:bg-blue-100 transition inline-block mb-4"
        >
          📸 Chọn ảnh cần tìm
        </label>

        <div id="previewContainer" class="hidden mt-4">
          <p class="text-gray-500 mb-2">Ảnh bạn vừa tải lên:</p>
          <img
            id="preview"
            src=""
            alt="Preview"
            class="max-h-64 mx-auto rounded-lg shadow mb-6"
          />

          <div class="mb-6 max-w-xs mx-auto text-left">
            <label class="block text-gray-700 font-bold mb-2"
              >Số lượng kết quả (K):</label
            >
            <select
              id="kValue"
              class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
            >
              <option value="5">5 ảnh (Nhanh)</option>
              <option value="10" selected>10 ảnh (Khuyên dùng)</option>
              <option value="20">20 ảnh</option>
              <option value="50">50 ảnh (Đánh giá sâu)</option>
            </select>
          </div>

          <button
            onclick="searchImage()"
            class="bg-green-500 text-white px-8 py-2 rounded-lg font-bold hover:bg-green-600 shadow-lg hover:shadow-xl transition"
          >
            🔍 Tìm Kiếm Ngay
          </button>
        </div>

        <div
          id="loading"
          class="hidden mt-4 text-blue-600 font-bold bg-blue-50 p-3 rounded-lg border border-blue-200 max-w-sm mx-auto"
        >
          <div class="flex items-center justify-center gap-2">
            <svg
              class="animate-spin h-5 w-5 text-blue-600"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            <span id="loadingText" class="animate-pulse"
              >⏳ Đang kết nối tới Server...</span
            >
          </div>
        </div>
      </div>

      <div id="resultsArea" class="hidden">
        <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">
          Kết Quả Tra Cứu Trong Hệ Thống:
        </h2>
        <div
          id="resultsGrid"
          class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4"
        ></div>
      </div>
    </div>

    <script>
      let selectedFile = null;

      function previewImage(event) {
        selectedFile = event.target.files[0];
        if (selectedFile) {
          const reader = new FileReader();
          reader.onload = function (e) {
            document.getElementById("preview").src = e.target.result;
            document
              .getElementById("previewContainer")
              .classList.remove("hidden");
            document.getElementById("resultsArea").classList.add("hidden");
          };
          reader.readAsDataURL(selectedFile);
        }
      }

      async function searchImage() {
        if (!selectedFile) return;

        const kValue = document.getElementById("kValue").value;
        const formData = new FormData();
        formData.append("file", selectedFile);
        formData.append("k", kValue);

        const loadingDiv = document.getElementById("loading");
        const loadingText = document.getElementById("loadingText");
        const resultsArea = document.getElementById("resultsArea");

        loadingDiv.classList.remove("hidden");
        resultsArea.classList.add("hidden");
        loadingText.innerText = "⏳ Đang tải ảnh lên Server...";

        try {
          const response = await fetch("/search", {
            method: "POST",
            body: formData,
          });

          const reader = response.body.getReader();
          const decoder = new TextDecoder();

          while (true) {
            const { value, done } = await reader.read();
            if (done) break;

            const textChunk = decoder.decode(value, { stream: true });
            const lines = textChunk
              .split("\n")
              .filter((line) => line.trim() !== "");

            for (let line of lines) {
              const data = JSON.parse(line);

              if (data.error) {
                alert("Lỗi: " + data.error);
                loadingDiv.classList.add("hidden");
                return;
              }

              if (data.step && !data.results) {
                loadingText.innerText = data.step;
              }

              // Nhận thêm dữ liệu bầu chọn từ Server
              if (data.results) {
                renderResults(
                  data.results,
                  data.predicted_dish,
                  data.majority_votes,
                  data.vote_count,
                );
                loadingDiv.classList.add("hidden");
              }
            }
          }
        } catch (error) {
          console.error(error);
          alert("Lỗi kết nối tới Server!");
          loadingDiv.classList.add("hidden");
        }
      }

      // Đã cập nhật hàm render để vẽ viền Xanh/Đỏ
      function renderResults(results, predictedDish, votes, voteCount) {
        const area = document.getElementById("resultsArea");

        // Xây dựng lại Layout để hiển thị Kết quả bầu chọn tổng quát ở trên cùng
        area.innerHTML = `
                <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6 rounded-lg shadow-sm flex justify-between items-center">
                    <div>
                        <h2 class="text-xl font-bold text-gray-800">
                            Dự đoán món ăn: <span class="text-blue-600 text-2xl uppercase">${predictedDish}</span>
                        </h2>
                        <p class="text-gray-600 mt-1 text-sm">
                            Hệ thống đã phân tích Top ${voteCount} ảnh giống nhất và có <b>${votes}/${voteCount}</b> ảnh khẳng định đây là món ${predictedDish}.
                        </p>
                    </div>
                    <div class="text-4xl">🤖</div>
                </div>
                <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4"></div>
            `;

        const grid = document.getElementById("resultsGrid");

        results.forEach((item) => {
          const similarityPercent = item.similarity.toFixed(1);

          // Quyết định màu sắc khung và Badge
          const borderClass = item.is_correct
            ? "border-4 border-green-400 shadow-green-100"
            : "border-4 border-red-400 shadow-red-100 opacity-80";

          const badge = item.is_correct
            ? `<div class="bg-green-500 text-white text-xs font-bold px-2 py-1 absolute top-0 right-0 rounded-bl-lg z-10">ĐÚNG MÓN</div>`
            : `<div class="bg-red-500 text-white text-xs font-bold px-2 py-1 absolute top-0 right-0 rounded-bl-lg z-10">SAI LỆCH</div>`;

          grid.innerHTML += `
                    <div class="bg-white rounded-lg overflow-hidden shadow-md relative flex flex-col transition-all duration-300 ${borderClass}">
                        ${badge}
                        <img src="${item.image_url}" class="w-full h-32 object-cover" alt="${item.dish_name}">
                        <div class="p-3 text-center flex-grow flex flex-col justify-between">
                            <h3 class="font-bold text-gray-800 text-sm mb-2">${item.dish_name}</h3>
                            <p class="text-xs font-semibold text-gray-600 bg-gray-100 rounded-full py-1 mb-1">
                                Độ giống: ${similarityPercent}%
                            </p>
                        </div>
                    </div>
                `;
        });

        area.classList.remove("hidden");
      }
    </script>
  </body>
</html>

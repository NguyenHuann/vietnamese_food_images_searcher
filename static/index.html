<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Ẩm Thực Việt Nam - Image Retrieval</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen font-sans">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
      <h1 class="text-3xl font-bold text-center text-blue-600 mb-8">
        Tra Cứu Món Ăn Việt Nam Bằng AI
      </h1>

      <div class="bg-white p-6 rounded-lg shadow-md mb-8 text-center">
        <input
          type="file"
          id="imageInput"
          accept="image/*"
          class="hidden"
          onchange="previewImage(event)"
        />
        <label
          for="imageInput"
          class="cursor-pointer bg-blue-50 text-blue-600 border border-blue-200 px-6 py-3 rounded-lg font-semibold hover:bg-blue-100 transition inline-block mb-4"
        >
          📸 Chọn ảnh cần tìm
        </label>

        <div id="previewContainer" class="hidden mt-4">
          <p class="text-gray-500 mb-2">Ảnh bạn vừa tải lên:</p>
          <img
            id="preview"
            src=""
            alt="Preview"
            class="max-h-64 mx-auto rounded-lg shadow"
          />
          <button
            onclick="searchImage()"
            class="mt-4 bg-green-500 text-white px-8 py-2 rounded-lg font-bold hover:bg-green-600 shadow-lg hover:shadow-xl transition"
          >
            🔍 Tìm Kiếm Ngay
          </button>
        </div>
          <div id="loading" class="hidden mt-4 text-blue-600 font-bold bg-blue-50 p-3 rounded-lg border border-blue-200">
            <div class="flex items-center justify-center gap-2">
              <svg class="animate-spin h-5 w-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
              <span id="loadingText" class="animate-pulse">⏳ Đang kết nối tới Server...</span>
            </div>
          </div>

      <div id="resultsArea" class="hidden">
        <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">
          Top 5 Bức Ảnh Giống Nhất Trong Hệ Thống:
        </h2>
        <div
          id="resultsGrid"
          class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4"
        ></div>
      </div>
    </div>

    <script>
      let selectedFile = null;

      // Chức năng hiển thị trước ảnh (Preview)
      function previewImage(event) {
        selectedFile = event.target.files[0];
        if (selectedFile) {
          const reader = new FileReader();
          reader.onload = function (e) {
            document.getElementById("preview").src = e.target.result;
            document
              .getElementById("previewContainer")
              .classList.remove("hidden");
            document.getElementById("resultsArea").classList.add("hidden");
          };
          reader.readAsDataURL(selectedFile);
        }
      }

      // Chức năng gọi API Backend
async function searchImage() {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append("file", selectedFile);

            const loadingDiv = document.getElementById('loading');
            const loadingText = document.getElementById('loadingText');
            const resultsArea = document.getElementById('resultsArea');

            loadingDiv.classList.remove('hidden');
            resultsArea.classList.add('hidden');
            loadingText.innerText = "⏳ Đang tải ảnh lên Server...";

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    body: formData
                });
                
                // Mở luồng đọc dữ liệu trả về (Stream)
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break; // Luồng kết thúc
                    
                    // Giải mã luồng byte thành chuỗi
                    const textChunk = decoder.decode(value, { stream: true });
                    
                    // Cắt các chuỗi JSON bằng dấu xuống dòng (phòng trường hợp 2 dòng đến cùng lúc)
                    const lines = textChunk.split("\n").filter(line => line.trim() !== "");
                    
                    for (let line of lines) {
                        const data = JSON.parse(line);
                        
                        if (data.error) {
                            alert("Lỗi: " + data.error);
                            loadingDiv.classList.add('hidden');
                            return;
                        }

                        // Nếu server báo Cập nhật bước
                        if (data.step && !data.results) {
                            loadingText.innerText = data.step;
                        }

                        // Nếu server trả về Kết quả cuối cùng
                        if (data.results) {
                            renderResults(data.results);
                            loadingDiv.classList.add('hidden');
                        }
                    }
                }
            } catch (error) {
                console.error(error);
                alert("Lỗi kết nối tới Server!");
                loadingDiv.classList.add('hidden');
            }
        }

      // Hiển thị kết quả ra Web
      function renderResults(results) {
        const grid = document.getElementById("resultsGrid");
        grid.innerHTML = ""; // Xóa kết quả cũ

        results.forEach((item, index) => {
          const similarityPercent = (item.similarity * 100).toFixed(1);

          // Card kết quả (Top 1 sẽ có viền vàng nổi bật)
          const cardClass =
            index === 0
              ? "bg-yellow-50 border-2 border-yellow-400 rounded-lg overflow-hidden shadow-lg transform scale-105"
              : "bg-white rounded-lg overflow-hidden shadow border border-gray-200";

          const badge =
            index === 0
              ? `<div class="bg-yellow-400 text-yellow-900 text-xs font-bold px-2 py-1 absolute top-0 right-0 rounded-bl-lg">TOP 1 MATCH</div>`
              : "";

          grid.innerHTML += `
                    <div class="${cardClass} relative flex flex-col">
                        ${badge}
                        <img src="${item.image_url}" class="w-full h-32 object-cover" alt="Food">
                        <div class="p-3 text-center flex-grow flex flex-col justify-between">
                            <h3 class="font-bold text-gray-800 text-sm mb-1">${item.dish_name}</h3>
                            <p class="text-xs font-semibold text-green-600 bg-green-100 rounded-full py-1">
                                Độ giống: ${similarityPercent}%
                            </p>
                        </div>
                    </div>
                `;
        });

        document.getElementById("resultsArea").classList.remove("hidden");
      }
    </script>
  </body>
</html>
